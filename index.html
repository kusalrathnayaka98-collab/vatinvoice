<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>VAT Invoice Manager — Gazette 2463/05</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{
          --navy:#0f1f3d;--navy2:#1a3260;--navy3:#243f7a;
          --blue:#2563eb;--blight:#dbeafe;--bdim:#1d4ed8;
          --gold:#c9a84c;--grn:#065f46;--glight:#d1fae5;
          --red:#991b1b;--rlight:#fee2e2;
          --bg:#f4f6fb;--surf:#fff;--surf2:#f8faff;
          --bord:#e2e8f4;--bord2:#c8d5ea;
          --tx:#0f1f3d;--tx2:#4a5d80;--tx3:#7a8faa;
          --rad:12px;--rsm:7px;
          --sh:0 1px 3px rgba(15,31,61,.08),0 4px 16px rgba(15,31,61,.06);
          --shlg:0 8px 32px rgba(15,31,61,.14);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.6}
        .app{display:flex;min-height:100vh}
        /* sidebar */
        .sb{width:240px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
        .sbl{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
        .sbt{font-family:'DM Serif Display',serif;font-size:18px;color:#fff;line-height:1.2}
        .sbs{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1.2px;margin-top:4px}
        .sbn{padding:16px 12px;flex:1}
        .nsl{font-size:9px;color:rgba(255,255,255,.22);text-transform:uppercase;letter-spacing:1.4px;padding:12px 14px 6px;font-weight:600}
        .ni{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--rsm);cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
        .ni:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
        .ni.on{background:rgba(255,255,255,.12);color:#fff;font-weight:500}
        .ni svg{width:15px;height:15px;flex-shrink:0}
        .nbadge{margin-left:auto;background:rgba(255,255,255,.14);color:rgba(255,255,255,.65);font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px}
        .sbf{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.28);line-height:1.5}
        /* main */
        .main{flex:1;overflow:auto}
        .tbar{background:var(--surf);border-bottom:1px solid var(--bord);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
        .tbar-t{font-size:16px;font-weight:600}
        .tbar-r{display:flex;align-items:center;gap:10px}
        .ct{padding:28px 32px}
        /* stats */
        .sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
        .sc{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rad);padding:18px 20px;box-shadow:var(--sh)}
        .sl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:6px}
        .sv{font-size:22px;font-weight:600;font-family:'DM Serif Display',serif}
        .ss{font-size:11px;color:var(--tx3);margin-top:3px}
        .sc.acc{background:var(--navy);border-color:var(--navy2)}
        .sc.acc .sl{color:rgba(255,255,255,.42)}
        .sc.acc .sv{color:#fff}
        .sc.acc .ss{color:rgba(255,255,255,.32)}
        /* buttons */
        .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--rsm);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;font-family:'DM Sans',sans-serif}
        .bp{background:var(--blue);color:#fff;border-color:var(--bdim)}.bp:hover{background:var(--bdim)}
        .bs{background:var(--surf);color:var(--tx);border-color:var(--bord2)}.bs:hover{background:var(--surf2);border-color:var(--navy3)}
        .bd{background:var(--rlight);color:var(--red);border-color:#fca5a5}.bd:hover{background:#fecaca}
        .bg2{background:var(--glight);color:var(--grn);border-color:#6ee7b7}.bg2:hover{background:#a7f3d0}
        .bsm{padding:5px 11px;font-size:12px}
        .btn svg{width:14px;height:14px}
        /* table */
        .tw{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rad);box-shadow:var(--sh);overflow:hidden}
        .th2{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bord)}
        .tsrch{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--bord);border-radius:var(--rsm);padding:7px 12px;width:300px}
        .tsrch input{background:none;border:none;outline:none;font-size:13px;color:var(--tx);width:100%;font-family:'DM Sans',sans-serif}
        table{width:100%;border-collapse:collapse}
        thead tr{background:var(--surf2);border-bottom:1px solid var(--bord)}
        th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.7px}
        th.r,td.r{text-align:right}th.c,td.c{text-align:center}
        td{padding:11px 16px;border-bottom:1px solid var(--bord);font-size:13px}
        tbody tr:last-child td{border-bottom:none}
        tbody tr:hover{background:var(--surf2)}
        .sco{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--blue);background:var(--blight);padding:3px 8px;border-radius:4px;display:inline-block}
        /* form */
        .fw{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rad);box-shadow:var(--sh);overflow:hidden}
        .fhdr{background:var(--navy);padding:20px 28px;display:flex;align-items:center;justify-content:space-between}
        .fhtitle{font-family:'DM Serif Display',serif;font-size:20px;color:#fff}
        .fhser{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);background:rgba(255,255,255,.08);padding:6px 14px;border-radius:6px;border:1px solid rgba(201,168,76,.3)}
        .gzbar{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-bottom:1px solid #bbf7d0;padding:10px 28px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--grn)}
        .fbdy{padding:24px 28px}
        .fsc{margin-bottom:24px}
        .fstit{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.9px;padding-bottom:10px;margin-bottom:14px;border-bottom:1px solid var(--bord)}
        .fg{display:grid;gap:12px}
        .fg2{grid-template-columns:1fr 1fr}
        .fg3{grid-template-columns:1fr 1fr 1fr}
        .fg4{grid-template-columns:1fr 1fr 1fr 1fr}
        .fcols{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .fld{display:flex;flex-direction:column;gap:5px}
        .fld label{font-size:12px;font-weight:500;color:var(--tx2)}
        .req{color:var(--red);margin-left:2px}
        .fld input,.fld select{background:var(--bg);border:1px solid var(--bord);border-radius:var(--rsm);padding:9px 12px;font-size:13px;color:var(--tx);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;width:100%}
        .fld input:focus,.fld select:focus{border-color:var(--blue);background:#fff}
        .mono{font-family:'JetBrains Mono',monospace;font-size:12px}
        /* client picker */
        .cpbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surf2);border:1px solid var(--bord);border-radius:var(--rsm);margin-bottom:12px;cursor:pointer;transition:border-color .15s}
        .cpbar:hover{border-color:var(--blue);background:#fff}
        .cptext{flex:1;font-size:13px}
        .cphint{color:var(--tx3)}
        .cpsel{color:var(--blue);font-weight:500}
        /* room items table */
        .rtw{overflow-x:auto;border:1px solid var(--bord);border-radius:var(--rsm)}
        .rtbl{width:100%;border-collapse:collapse;min-width:900px}
        .rtbl thead{background:#f1f5ff}
        .rtbl th{padding:9px 10px;color:#0f1f3d;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-right:1px solid #dde4f0;white-space:nowrap;border-bottom:2px solid #c8d5ea}
        .rtbl th:last-child{border-right:none}
        .rtbl td{padding:0;border-bottom:1px solid var(--bord);border-right:1px solid var(--bord)}
        .rtbl td:last-child{border-right:none}
        .rtbl tbody tr:last-child td{border-bottom:none}
        .rtbl tbody tr:hover{background:var(--surf2)}
        .rtbl td input,.rtbl td select{background:transparent;border:none;outline:none;padding:9px 10px;font-size:13px;color:var(--tx);font-family:'DM Sans',sans-serif;width:100%;min-width:0}
        .rtbl td input:focus,.rtbl td select:focus{background:#fff}
        .rtbl td input[readonly]{color:var(--tx2);background:var(--surf2);font-family:'JetBrains Mono',monospace;font-size:12px}
        .rtbl td.calc{padding:9px 10px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--tx2);background:var(--surf2);white-space:nowrap;text-align:right}
        .rtbl td.delbtn{padding:6px 8px;text-align:center;width:40px}
        .rtbl td select{background:var(--surf2)}
        /* totals */
        .tots{margin-top:14px;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
        .trow{display:flex;gap:32px;align-items:baseline}
        .trow .tl{font-size:12px;color:var(--tx3);min-width:220px;text-align:right}
        .trow .tv{font-size:13px;min-width:140px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:500}
        .trow.grand{border-top:2px solid var(--navy);padding-top:8px;margin-top:4px}
        .trow.grand .tl{font-size:13px;color:var(--navy);font-weight:600}
        .trow.grand .tv{font-size:15px;color:var(--navy);font-weight:600}
        .twds{font-size:11px;color:var(--tx3);font-style:italic;margin-top:2px}
        /* preview */
        .pvw{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rad);box-shadow:var(--sh);overflow:hidden}
        .pvbar{padding:14px 24px;background:var(--surf2);border-bottom:1px solid var(--bord);display:flex;align-items:center;justify-content:space-between}
        .pvbody{padding:32px}
        /* print doc */
        .pd{max-width:780px;margin:0 auto;font-family:'DM Sans',Arial,sans-serif;color:#0f1f3d;font-size:10pt;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        .ptit{background:#0f1f3d;color:#fff;text-align:center;padding:12px;font-size:16pt;font-weight:700;letter-spacing:2px;margin-bottom:4px;font-family:'DM Serif Display',serif;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        .pgaz{background:#d1fae5;color:#065f46;text-align:center;padding:5px;font-size:8pt;margin-bottom:14px;border:1px solid #6ee7b7;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        .psr{display:flex;justify-content:space-between;margin-bottom:14px;gap:16px}
        .psb{background:#dbeafe;border:1px solid #93c5fd;padding:8px 14px;border-radius:6px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        .psb .sl2{font-size:9pt;color:#1e40af;margin-bottom:2px}
        .psb .sv2{font-family:'JetBrains Mono',monospace;font-size:13pt;color:#1d4ed8;font-weight:700}
        .pdb{text-align:right}
        .pdb .dl{font-size:9pt;color:#4a5d80;margin-bottom:2px}
        .pdb .dv{font-size:13pt;font-weight:700}
        .pt3{width:100%;border-collapse:collapse;margin-bottom:10px}
        .pt3 th{background:#0f1f3d;color:#fff;padding:5px 8px;font-size:8pt;text-align:left;border:1px solid #243f7a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        .pt3 th.r{text-align:right}.pt3 th.c{text-align:center}
        .pt3 td{border:1px solid #cbd5e1;padding:5px 8px;font-size:8.5pt}
        .pt3 td.r{text-align:right}.pt3 td.c{text-align:center}
        .pt3 tr.tr2 td{background:#0f1f3d;color:#fff;font-weight:700;font-size:10pt;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        .pt3 tr.sr2 td{background:#f0f9ff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        .pt3 td.dim{color:#888;font-size:8pt}
        .pwds{background:#fef3c7;border:1px solid #f59e0b;padding:8px 12px;font-size:9pt;margin-bottom:10px;border-radius:4px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        .psig{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:10px}
        .psigb{border:1px solid #cbd5e1;padding:12px 14px;border-radius:4px}
        .psigb h4{font-size:8pt;text-transform:uppercase;color:#4a5d80;letter-spacing:.8px;margin-bottom:8px}
        .psigl{border-bottom:1px solid #94a3b8;height:28px;margin-bottom:5px}
        .pfn{font-size:7pt;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:8px;margin-top:10px}
        .h2b{background:#1a3260;-webkit-print-color-adjust:exact;print-color-adjust:exact}
        /* clients */
        .cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
        .cc{background:var(--surf);border:1px solid var(--bord);border-radius:var(--rad);padding:18px;box-shadow:var(--sh);transition:all .15s}
        .cc:hover{border-color:var(--bord2);box-shadow:var(--shlg)}
        .cch{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        .ccb{font-size:12px;color:var(--tx2);line-height:1.8}
        .cca{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--bord)}
        .ci{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
        .cib{background:#dbeafe;color:#1d4ed8}.cig{background:#d1fae5;color:#065f46}
        .cip{background:#ede9fe;color:#5b21b6}.cia{background:#fef3c7;color:#92400e}
        .cir{background:#fee2e2;color:#991b1b}.cit{background:#ccfbf1;color:#0f766e}
        /* modals */
        .mo{position:fixed;inset:0;background:rgba(15,31,61,.5);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s}
        .mo.open{opacity:1;pointer-events:all}
        .mbox{background:var(--surf);border-radius:var(--rad);width:560px;max-width:95vw;max-height:84vh;display:flex;flex-direction:column;box-shadow:var(--shlg);transform:translateY(16px);transition:transform .2s}
        .mo.open .mbox{transform:translateY(0)}
        .mbox.sm{width:500px}
        .mhdr{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .mhdr h3{font-size:16px;font-weight:600}
        .mcls{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:22px;line-height:1;padding:4px}.mcls:hover{color:var(--tx)}
        .msrch{padding:14px 24px;flex-shrink:0}
        .msrch input{width:100%;background:var(--bg);border:1px solid var(--bord);border-radius:var(--rsm);padding:9px 14px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
        .msrch input:focus{border-color:var(--blue)}
        .mlist{flex:1;overflow-y:auto;padding:0 24px 16px}
        .mrow{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--rsm);cursor:pointer;transition:background .1s;border:1px solid transparent;margin-bottom:4px}
        .mrow:hover{background:var(--surf2);border-color:var(--bord)}
        .mrow.sel{background:var(--blight);border-color:#93c5fd}
        .mrow .mn{font-size:13px;font-weight:500}
        .mrow .ms{font-size:11px;color:var(--tx3)}
        .mftr{padding:14px 24px;border-top:1px solid var(--bord);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
        .memp{text-align:center;padding:32px 0;color:var(--tx3);font-size:13px}
        .cfbdy{padding:16px 24px 0;overflow-y:auto;flex:1}
        /* empty */
        .emp{text-align:center;padding:60px 20px}
        .eico{width:64px;height:64px;background:var(--surf2);border:1px solid var(--bord);border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
        .eico svg{width:28px;height:28px;color:var(--tx3)}
        .etit{font-size:16px;font-weight:500;margin-bottom:6px}
        .esub{font-size:13px;color:var(--tx3)}
        /* toast + confirm */
        .toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:var(--rsm);font-size:13px;font-weight:500;box-shadow:var(--shlg);z-index:9999;transform:translateY(80px);opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
        .toast.show{transform:translateY(0);opacity:1}
        .cov{position:fixed;inset:0;background:rgba(15,31,61,.5);display:none;align-items:center;justify-content:center;z-index:300}
        .cov.show{display:flex}
        .cob{background:var(--surf);border-radius:var(--rad);padding:28px 32px;max-width:380px;width:90%;box-shadow:var(--shlg)}
        .cotit{font-size:16px;font-weight:600;margin-bottom:8px}
        .cosub{font-size:13px;color:var(--tx2);margin-bottom:20px;line-height:1.6}
        .coact{display:flex;gap:10px;justify-content:flex-end}
        /* loading overlay */
        .load{position:fixed;inset:0;background:rgba(15,31,61,.6);display:flex;align-items:center;justify-content:center;z-index:500;display:none}
        .load.show{display:flex}
        .load-box{background:#fff;border-radius:var(--rad);padding:28px 36px;text-align:center;font-size:14px;color:var(--tx2)}
        .spin{width:32px;height:32px;border:3px solid var(--bord);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        /* invoice view modal */
        .inv-view .mbox{width:820px;max-width:97vw;max-height:92vh}
        @media print{
          .sb,.tbar,.pvbar,.sgrid{display:none!important}
          .main{overflow:visible}.ct{padding:0}
          .pvw{border:none;box-shadow:none}.pvbody{padding:6px 10px}
          body{background:white}
          @page{size:A4 portrait;margin:9mm 11mm}
          .pd{max-width:100%;font-size:7pt;line-height:1.3}
          .ptit{font-size:10.5pt;padding:4px 10px;margin-bottom:2px;letter-spacing:1.5px;
            background:#0f1f3d!important;color:#fff!important;
            -webkit-print-color-adjust:exact;print-color-adjust:exact}
          .pgaz{font-size:5.5pt;padding:2px;margin-bottom:5px;
            background:#d1fae5!important;color:#065f46!important;
            -webkit-print-color-adjust:exact;print-color-adjust:exact}
          .psr{margin-bottom:5px}
          .psb{padding:4px 8px;
            background:#dbeafe!important;
            -webkit-print-color-adjust:exact;print-color-adjust:exact}
          .psb .sl2{font-size:6pt}
          .psb .sv2{font-size:9pt}
          .pdb .dl{font-size:6pt}
          .pdb .dv{font-size:9pt}
          .pt3{margin-bottom:4px}
          .pt3 th{padding:2.5px 5px;font-size:6pt;
            background:#0f1f3d!important;color:#fff!important;
            -webkit-print-color-adjust:exact;print-color-adjust:exact}
          .pt3 th.h2b{background:#1a3260!important;
            -webkit-print-color-adjust:exact;print-color-adjust:exact}
          .pt3 td{padding:2.5px 5px;font-size:6.5pt}
          .pt3 tr.tr2 td{font-size:7pt;
            background:#0f1f3d!important;color:#fff!important;
            -webkit-print-color-adjust:exact;print-color-adjust:exact}
          .pt3 tr.sr2 td{font-size:6pt;
            background:#f0f9ff!important;
            -webkit-print-color-adjust:exact;print-color-adjust:exact}
          .pwds{padding:3px 7px;font-size:6.5pt;margin-bottom:4px;
            background:#fef3c7!important;
            -webkit-print-color-adjust:exact;print-color-adjust:exact}
          .psig{gap:8px;margin-top:4px}
          .psigb{padding:5px 8px}
          .psigb h4{font-size:6pt;margin-bottom:3px}
          .psigl{height:16px;margin-bottom:2px}
          .pfn{font-size:5.5pt;padding-top:3px;margin-top:3px}
          *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">

<div class="sb">
  <div class="sbl"><div class="sbt">Invoice Manager</div><div class="sbs">VAT · Gazette 2463/05</div></div>
  <nav class="sbn">
    <div class="nsl">Invoices</div>
    <button class="ni on" id="n-list" onclick="showV('list')">
